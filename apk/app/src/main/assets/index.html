<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOVA TV</title>
<style>
  :root {
    --bg:#09090f; --surface:#0e0f18; --card:#13141f; --border:#1a1c2a;
    --accent:#7c3aed; --accent-hi:#9d5cf6; --text:#eaedf5; --muted:#454866;
    --green:#22c55e; --header:#0b0c14; --ctrl:rgba(7,7,14,0.95);
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font-family:'Segoe UI',sans-serif; overflow:hidden; height:100vh; }

  #header {
    display:flex; align-items:center; height:60px;
    background:var(--header); padding:0 20px; gap:12px;
    border-bottom:1px solid var(--border); flex-shrink:0;
  }
  #logo { font-family:Consolas,monospace; font-size:20px; white-space:nowrap; flex-shrink:0; }
  #logo span { color:var(--accent); }
  #nav { display:flex; gap:6px; flex-shrink:0; }
  .nav-btn {
    background:var(--card); color:var(--text); border:none;
    padding:7px 16px; border-radius:6px; font-size:14px; font-weight:700;
    cursor:pointer; transition:background .15s; white-space:nowrap;
  }
  .nav-btn.active { background:var(--accent); }
  .nav-btn:focus { outline:3px solid var(--accent-hi); outline-offset:2px; }
  #url-area { display:flex; gap:6px; flex:1; align-items:center; }
  #url-input {
    background:var(--card); color:var(--text); border:1px solid var(--border);
    padding:7px 10px; border-radius:6px; font-size:12px; flex:1; outline:none; min-width:0;
  }
  #url-input:focus { border-color:var(--accent); }
  #load-btn {
    background:var(--accent); color:#fff; border:none;
    padding:7px 14px; border-radius:6px; font-size:13px; font-weight:700;
    cursor:pointer; white-space:nowrap; flex-shrink:0;
  }
  #load-btn:focus { outline:3px solid var(--accent-hi); }
  #status-dot { font-size:10px; flex-shrink:0; }
  #status-txt { font-size:11px; color:var(--muted); white-space:nowrap; flex-shrink:0; }

  #app { display:flex; height:calc(100vh - 60px); }

  #sidebar {
    width:250px; background:var(--surface); border-right:1px solid var(--border);
    display:flex; flex-direction:column; flex-shrink:0;
  }
  #search-wrap { padding:8px; }
  #search {
    width:100%; background:var(--card); color:var(--text);
    border:1px solid var(--border); padding:7px 10px; border-radius:6px;
    font-size:13px; outline:none;
  }
  #search:focus { border-color:var(--accent); }
  #list-title { padding:5px 12px; font-size:10px; font-weight:700; color:var(--muted); }
  #sidebar-list { flex:1; overflow-y:auto; }
  #sidebar-list::-webkit-scrollbar { width:3px; }
  #sidebar-list::-webkit-scrollbar-thumb { background:var(--border); }

  .ch-row {
    display:flex; align-items:center; gap:8px; padding:7px 10px;
    cursor:pointer; border-bottom:1px solid var(--border); transition:background .1s;
  }
  .ch-row:hover,.ch-row:focus { background:var(--card); outline:none; }
  .ch-row.active { background:var(--accent)33; }
  .ch-logo { width:32px; height:32px; border-radius:4px; object-fit:cover; background:var(--card); flex-shrink:0; }
  .ch-logo-ph {
    width:32px; height:32px; border-radius:4px; background:var(--accent)33;
    display:flex; align-items:center; justify-content:center;
    font-size:10px; font-weight:700; color:var(--accent-hi); flex-shrink:0;
  }
  .ch-name { font-size:12px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .ch-group { font-size:10px; color:var(--muted); }

  .genre-btn {
    display:block; width:100%; text-align:left; background:none; color:var(--text);
    border:none; padding:9px 14px; font-size:13px; cursor:pointer;
    border-bottom:1px solid var(--border); transition:background .1s;
  }
  .genre-btn:hover,.genre-btn:focus { background:var(--card); outline:none; }
  .genre-btn.active { background:var(--accent)33; color:var(--accent-hi); font-weight:700; }
  .genre-count { font-size:10px; color:var(--muted); float:right; }

  #center { flex:1; display:flex; flex-direction:column; overflow:hidden; }
  #genre-bar {
    display:flex; gap:5px; padding:10px 14px; background:var(--header);
    border-bottom:1px solid var(--border); overflow-x:auto; flex-shrink:0;
  }
  #genre-bar::-webkit-scrollbar { height:2px; }
  .genre-tab {
    background:var(--card); color:var(--muted); border:none;
    padding:7px 16px; border-radius:6px; font-size:13px; font-weight:700;
    cursor:pointer; white-space:nowrap; flex-shrink:0; transition:all .15s;
  }
  .genre-tab.active { background:var(--accent); color:#fff; }
  .genre-tab:focus { outline:3px solid var(--accent-hi); }

  #movie-grid {
    flex:1; overflow-y:auto; display:grid;
    grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
    gap:12px; padding:12px; align-content:start;
  }
  #movie-grid::-webkit-scrollbar { width:3px; }
  #movie-grid::-webkit-scrollbar-thumb { background:var(--border); }

  .poster-card {
    background:var(--card); border-radius:8px; overflow:hidden;
    cursor:pointer; border:2px solid transparent; transition:border .15s,transform .1s;
  }
  .poster-card:hover,.poster-card:focus { border-color:var(--accent-hi); transform:scale(1.03); outline:none; }
  .poster-img { width:100%; aspect-ratio:2/3; object-fit:cover; background:var(--surface); display:block; }
  .poster-ph {
    width:100%; aspect-ratio:2/3; background:var(--surface);
    display:flex; align-items:center; justify-content:center;
    font-size:20px; font-weight:700; color:var(--accent)88;
  }
  .poster-title { padding:5px 7px 3px; font-size:11px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .poster-group { padding:0 7px 7px; font-size:10px; color:var(--muted); }

  #tv-center {
    flex:1; display:flex; align-items:center; justify-content:center;
    flex-direction:column; gap:14px; color:var(--muted);
  }

  /* PLAYER */
  #player-wrap {
    display:none; position:fixed; inset:0; background:#000; z-index:100; flex-direction:column;
  }
  #player-wrap.visible { display:flex; }
  #video-el { flex:1; width:100%; background:#000; }
  #ctrl-bar {
    position:absolute; bottom:0; left:0; right:0;
    background:linear-gradient(transparent,rgba(0,0,0,.9));
    padding:24px 20px 14px; display:flex; flex-direction:column; gap:8px;
    transition:opacity .3s;
  }
  #ctrl-bar.hidden { opacity:0; pointer-events:none; }
  #progress-wrap { height:5px; background:var(--border); border-radius:3px; cursor:pointer; position:relative; }
  #progress-fill { height:100%; background:var(--accent); border-radius:3px; width:0%; }
  #ctrl-row { display:flex; align-items:center; gap:14px; }
  .ctrl-btn {
    background:none; border:none; color:var(--text); font-size:20px;
    cursor:pointer; padding:4px; line-height:1; transition:color .15s;
  }
  .ctrl-btn:hover,.ctrl-btn:focus { color:var(--accent-hi); outline:none; }
  #vol-slider { width:70px; accent-color:var(--accent); cursor:pointer; }
  #time-lbl { font-size:12px; color:var(--muted); font-family:monospace; }
  #now-lbl { font-size:14px; font-weight:700; margin-left:6px; }
  #close-player {
    margin-left:auto; background:var(--card); border:none; color:var(--text);
    padding:5px 12px; border-radius:6px; font-size:12px; cursor:pointer; font-weight:700;
  }

  /* LOADING OVERLAY */
  #loading {
    display:none; position:fixed; inset:0; background:rgba(0,0,0,.7);
    align-items:center; justify-content:center; z-index:200; flex-direction:column; gap:16px;
  }
  #loading.show { display:flex; }
  .spinner {
    width:40px; height:40px; border:3px solid var(--border);
    border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite;
  }
  @keyframes spin { to { transform:rotate(360deg); } }

  #toast {
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(10px);
    background:var(--card); color:var(--text); padding:10px 20px; border-radius:8px;
    font-size:13px; opacity:0; transition:all .3s; pointer-events:none;
    border:1px solid var(--border); z-index:999;
  }
  #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div id="header">
  <div id="logo"><span>NOVA</span> TV</div>
  <nav id="nav" style="margin:0 auto">
    <button class="nav-btn active" onclick="setMode('tv')">📺 TV</button>
    <button class="nav-btn" onclick="setMode('movies')">🎬 Películas</button>
    <button class="nav-btn" onclick="setMode('series')">📂 Series</button>
  </nav>
  <div id="url-area" style="display:none">
    <input id="url-input" type="url" placeholder="URL lista M3U..." autocomplete="off" autocorrect="off" spellcheck="false">
    <button id="load-btn" onclick="loadList()">Cargar</button>
  </div>
  <span id="status-dot" style="color:var(--muted)">●</span>
  <span id="status-txt">Sin señal</span>
</div>

<div id="app">
  <div id="sidebar">
    <div id="search-wrap">
      <input id="search" type="text" placeholder="🔍 Buscar..." oninput="onSearch()" autocorrect="off">
    </div>
    <div id="list-title">CANALES</div>
    <div id="sidebar-list"></div>
  </div>
  <div id="center">
    <div id="genre-bar" style="display:none"></div>
    <div id="movie-grid" style="display:none"></div>
    <div id="tv-center">
      <div style="font-size:48px">📺</div>
      <div style="font-size:15px">Cargá una lista M3U y seleccioná un canal</div>
    </div>
  </div>
</div>

<div id="player-wrap">
  <video id="video-el" autoplay playsinline
    onended="closePlayer()" onerror="onVideoError()"></video>
  <div id="ctrl-bar">
    <div id="progress-wrap" onclick="seekClick(event)">
      <div id="progress-fill"></div>
    </div>
    <div id="ctrl-row">
      <button class="ctrl-btn" id="play-btn" onclick="togglePlay()">⏸</button>
      <button class="ctrl-btn" onclick="closePlayer()">⏹</button>
      <button class="ctrl-btn" id="mute-btn" onclick="toggleMute()">🔊</button>
      <input id="vol-slider" type="range" min="0" max="1" step="0.05" value="1" oninput="setVol(this.value)">
      <span id="time-lbl">0:00</span>
      <span id="now-lbl"></span>
      <button id="close-player" onclick="closePlayer()">✕ Cerrar</button>
    </div>
  </div>
</div>

<div id="loading"><div class="spinner"></div><div id="loading-txt">Cargando...</div></div>
<div id="toast"></div>

<script>
// ═══════════════════════════════════
//  STORAGE — guarda URL en localStorage
// ═══════════════════════════════════
const STORAGE_KEY = 'novatv_url';
const DEFAULT_URL = 'https://raw.githubusercontent.com/tinchocd22/Tvmaria/refs/heads/main/tvtincho.m3u';

function saveUrl(url) {
  try {
    if (window.Android) window.Android.saveData(STORAGE_KEY, url);
    else localStorage.setItem(STORAGE_KEY, url);
  } catch(e){}
}
function loadSavedUrl() {
  try {
    if (window.Android) return window.Android.loadData(STORAGE_KEY) || '';
    return localStorage.getItem(STORAGE_KEY) || '';
  } catch(e){ return ''; }
}

// ═══════════════════════════════════
//  STATE
// ═══════════════════════════════════
let allItems   = [];   // todos los canales/peliculas cargados
let mode       = 'tv';
let selGroup   = null;
let currentCh  = null;
let ctrlTimer  = null;

const VOD_EXT  = /\.(mp4|mkv|avi|mov|wmv|flv|ts|m2ts|webm|mpg|mpeg)(\?.*)?$/i;
const SER_RE   = /serie|season|temporada|episode|ep\b/i;
const BAD_RE   = /^(sin grupo|)$/i;

// ═══════════════════════════════════
//  INIT
// ═══════════════════════════════════
window.onload = function() {
  document.getElementById('url-input').value = DEFAULT_URL;
  loadList();
};

// ═══════════════════════════════════
//  PARSE M3U — directo en JS, sin servidor
// ═══════════════════════════════════
function parseM3U(text) {
  const items = []; let cur = null;
  for (let line of text.split('\n')) {
    line = line.trim();
    if (line.startsWith('#EXTINF:')) {
      cur = { name:'Item', group:'Sin grupo', logo:'', url:'', vod:false };
      const nameM = line.match(/,(.+)$/);
      if (nameM) cur.name = nameM[1].trim() || 'Item';
      const tagMap = { 'tvg-name':'name', 'group-title':'group', 'tvg-logo':'logo' };
      for (const [tag, key] of Object.entries(tagMap)) {
        const m = line.match(new RegExp(`${tag}="([^"]*)"`, 'i'));
        if (m && m[1]) cur[key] = m[1].trim();
      }
    } else if (line && !line.startsWith('#') && cur) {
      cur.url  = line;
      cur.vod  = VOD_EXT.test(line);
      items.push(cur); cur = null;
    }
  }
  return items;
}

// ═══════════════════════════════════
//  LOAD — fetch M3U directo desde el browser
// ═══════════════════════════════════
async function loadList() {
  let url = document.getElementById('url-input').value.trim();
  if (!url) { showToast('Ingresá una URL'); return; }

  url = url.replace('github.com','raw.githubusercontent.com').replace('/blob/','/')
           .replace(/\/$/,'');

  showLoading('Descargando lista...');
  try {
    let text = null;

    // Opción 1: puente nativo Android (más confiable, sin CORS)
    if (window.Android && window.Android.fetchUrl) {
      showLoading('Descargando...');
      await new Promise(resolve => setTimeout(resolve, 50)); // yield UI
      text = window.Android.fetchUrl(url);
      if (text && text.startsWith('ERROR:')) {
        console.warn('Android bridge error:', text);
        text = null;
      }
    }

    // Opción 2: fetch directo
    if (!text) {
      try {
        const res = await fetch(url, { mode: 'cors' });
        if (res.ok) text = await res.text();
      } catch(e) {}
    }

    // Opción 3: proxy CORS
    if (!text) {
      showLoading('Intentando via proxy...');
      try {
        const proxy = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url);
        const res2 = await fetch(proxy);
        if (res2.ok) text = await res2.text();
      } catch(e) {}
    }

    if (!text) throw new Error('No se pudo descargar la lista');

    const items = parseM3U(text);
    if (!items.length) throw new Error('La lista no tiene canales válidos');

    allItems = items;
    saveUrl(url);

    const live = items.filter(c => !c.vod).length;
    const vod  = items.filter(c =>  c.vod).length;
    setStatus(true, `${items.length} canales`);
    showToast('✓ ' + items.length + ' elementos  •  📺 ' + live + ' TV  •  🎬 ' + vod + ' VOD');
    hideLoading();
    setMode(mode, true);

  } catch(e) {
    hideLoading();
    showToast('Error: ' + e.message);
    setStatus(false, 'Error');
  }
}

// ═══════════════════════════════════
//  MODO
// ═══════════════════════════════════
function setMode(m, force=false) {
  if (m === mode && !force) return;
  mode = m;
  stopVideo();

  document.querySelectorAll('.nav-btn').forEach((b,i) => {
    b.classList.toggle('active', ['tv','movies','series'][i] === m);
  });

  const genreBar  = document.getElementById('genre-bar');
  const movieGrid = document.getElementById('movie-grid');
  const tvCenter  = document.getElementById('tv-center');
  const listTitle = document.getElementById('list-title');

  if (m === 'tv') {
    genreBar.style.display  = 'none';
    movieGrid.style.display = 'none';
    tvCenter.style.display  = 'flex';
    listTitle.textContent   = 'CANALES EN VIVO';
    renderTV();
  } else {
    genreBar.style.display  = 'flex';
    movieGrid.style.display = 'grid';
    tvCenter.style.display  = 'none';
    listTitle.textContent   = 'CATEGORÍAS';
    selGroup = null;
    renderGroups();
  }
}

// ═══════════════════════════════════
//  TV
// ═══════════════════════════════════
function getTV(q='') {
  let items = allItems.filter(c => !c.vod);
  if (q) items = items.filter(c => c.name.toLowerCase().includes(q));
  return items;
}

function renderTV(q='') {
  const items = getTV(q);
  const list  = document.getElementById('sidebar-list');
  document.getElementById('list-title').textContent = `CANALES (${items.length})`;
  list.innerHTML = '';
  items.forEach(ch => {
    const row = document.createElement('div');
    row.className = 'ch-row' + (currentCh?.url===ch.url ? ' active' : '');
    row.tabIndex  = 0;
    const logo = ch.logo
      ? `<img class="ch-logo" src="${ch.logo}" loading="lazy" onerror="this.outerHTML='<div class=ch-logo-ph>${ini(ch.name)}</div>'">`
      : `<div class="ch-logo-ph">${ini(ch.name)}</div>`;
    const grp = ch.group && !BAD_RE.test(ch.group)
      ? `<div class="ch-group">${ch.group}</div>` : '';
    row.innerHTML = logo + `<div><div class="ch-name">${ch.name}</div>${grp}</div>`;
    row.onclick = () => playItem(ch);
    row.onkeydown = e => (e.key==='Enter'||e.key===' ') && playItem(ch);
    list.appendChild(row);
  });
}

// ═══════════════════════════════════
//  GROUPS / MOVIES
// ═══════════════════════════════════
function getVOD() {
  if (mode==='series') return allItems.filter(c => c.vod && SER_RE.test(c.group));
  return allItems.filter(c => c.vod && !BAD_RE.test(c.group.trim()) && !SER_RE.test(c.group));
}

function renderGroups() {
  const base   = getVOD();
  const counts = {};
  base.forEach(c => counts[c.group] = (counts[c.group]||0)+1);
  const groups = Object.keys(counts).sort();
  if (!selGroup || !groups.includes(selGroup)) selGroup = groups[0] || null;

  // Sidebar
  const list = document.getElementById('sidebar-list');
  list.innerHTML = '';
  groups.forEach(g => {
    const btn = document.createElement('button');
    btn.className = 'genre-btn' + (g===selGroup?' active':'');
    btn.innerHTML = `${g}<span class="genre-count">${counts[g]}</span>`;
    btn.tabIndex  = 0;
    btn.onclick   = () => { selGroup=g; renderGroups(); };
    list.appendChild(btn);
  });

  // Top bar
  const bar = document.getElementById('genre-bar');
  bar.innerHTML = '';
  groups.forEach(g => {
    const tab = document.createElement('button');
    tab.className = 'genre-tab' + (g===selGroup?' active':'');
    tab.textContent = g; tab.tabIndex = 0;
    tab.onclick = () => { selGroup=g; renderGroups(); };
    bar.appendChild(tab);
  });

  renderMovies();
}

function renderMovies(q='') {
  let items = getVOD();
  if (selGroup) items = items.filter(c => c.group===selGroup);
  if (q) items = items.filter(c => c.name.toLowerCase().includes(q));

  const grid = document.getElementById('movie-grid');
  grid.innerHTML = '';
  if (!items.length) {
    grid.innerHTML='<div style="color:var(--muted);padding:30px">Sin resultados</div>'; return;
  }
  items.forEach(item => {
    const card = document.createElement('div');
    card.className='poster-card'; card.tabIndex=0;
    const img = item.logo
      ? `<img class="poster-img" src="${item.logo}" loading="lazy" onerror="this.outerHTML='<div class=poster-ph>${ini(item.name)}</div>'">`
      : `<div class="poster-ph">${ini(item.name)}</div>`;
    card.innerHTML = img +
      `<div class="poster-title">${item.name}</div>
       <div class="poster-group">${item.group}</div>`;
    card.onclick   = () => playItem(item);
    card.onkeydown = e => (e.key==='Enter'||e.key===' ') && playItem(item);
    grid.appendChild(card);
  });
}

// ═══════════════════════════════════
//  SEARCH
// ═══════════════════════════════════
let searchTimer = null;
function onSearch() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    const q = document.getElementById('search').value.toLowerCase();
    if (mode==='tv') renderTV(q);
    else renderMovies(q);
  }, 300);
}

// ═══════════════════════════════════
//  PLAYBACK
// ═══════════════════════════════════
function playItem(item) {
  currentCh = item;
  const vid = document.getElementById('video-el');
  vid.src = item.url; vid.load(); vid.play().catch(()=>{});
  document.getElementById('now-lbl').textContent = item.name;
  document.getElementById('player-wrap').classList.add('visible');
  document.getElementById('play-btn').textContent = '⏸';
  showCtrl();
  startProgress();
  // Auto fullscreen
  document.getElementById('player-wrap').requestFullscreen().catch(()=>{});
}

function stopVideo() {
  const vid = document.getElementById('video-el');
  vid.pause(); vid.src = ''; stopProgress();
}

function closePlayer() {
  stopVideo();
  document.getElementById('player-wrap').classList.remove('visible');
  if (document.fullscreenElement) document.exitFullscreen().catch(()=>{});
  currentCh = null;
  clearTimeout(ctrlTimer);
}

function togglePlay() {
  const vid = document.getElementById('video-el');
  if (vid.paused) { vid.play(); document.getElementById('play-btn').textContent='⏸'; }
  else            { vid.pause(); document.getElementById('play-btn').textContent='▶'; }
}

function toggleMute() {
  const vid = document.getElementById('video-el');
  vid.muted = !vid.muted;
  document.getElementById('mute-btn').textContent = vid.muted ? '🔇' : '🔊';
}

function setVol(v) { document.getElementById('video-el').volume = parseFloat(v); }

function seekClick(e) {
  const vid=document.getElementById('video-el');
  const bar=document.getElementById('progress-wrap');
  if (vid.duration) vid.currentTime = (e.offsetX/bar.offsetWidth)*vid.duration;
}

function onVideoError() { showToast('⚠ Error al reproducir'); }

let progTimer=null;
function startProgress() {
  stopProgress();
  progTimer = setInterval(() => {
    const vid=document.getElementById('video-el');
    const fill=document.getElementById('progress-fill');
    const lbl=document.getElementById('time-lbl');
    if (vid.duration) {
      fill.style.width=(vid.currentTime/vid.duration*100)+'%';
      lbl.textContent=fmt(vid.currentTime)+' / '+fmt(vid.duration);
    } else {
      fill.style.width='0%'; lbl.textContent=fmt(vid.currentTime)+' / LIVE';
    }
  }, 500);
}
function stopProgress() { clearInterval(progTimer); }

// Controls auto-hide
function showCtrl() {
  const bar=document.getElementById('ctrl-bar');
  bar.classList.remove('hidden');
  clearTimeout(ctrlTimer);
  ctrlTimer = setTimeout(()=>bar.classList.add('hidden'), 3500);
}
document.getElementById('player-wrap').addEventListener('mousemove', showCtrl);
document.getElementById('player-wrap').addEventListener('touchstart', showCtrl);
document.getElementById('video-el').addEventListener('click', ()=>{
  const bar=document.getElementById('ctrl-bar');
  bar.classList.contains('hidden') ? showCtrl() : bar.classList.add('hidden');
});

// ═══════════════════════════════════
//  KEYBOARD (Control remoto)
// ═══════════════════════════════════
document.addEventListener('keydown', e => {
  const inPlayer = document.getElementById('player-wrap').classList.contains('visible');
  if (inPlayer) { handlePlayerKey(e); return; }
  const tag = document.activeElement?.tagName;
  if (tag==='INPUT') return;
  if (e.key==='Enter'||e.key===' ') { document.activeElement?.click(); e.preventDefault(); }
  if (e.key==='ArrowDown'||e.key==='ArrowUp') {
    e.preventDefault();
    const items=[...document.querySelectorAll('.ch-row,.genre-btn,.poster-card')];
    const i=items.indexOf(document.activeElement);
    const next=e.key==='ArrowDown'?items[i+1]:items[i-1];
    next?.focus(); next?.scrollIntoView({block:'nearest'});
  }
  if (e.key==='ArrowRight') {
    e.preventDefault();
    const tabs=[...document.querySelectorAll('.genre-tab')];
    const cards=[...document.querySelectorAll('.poster-card')];
    const i=tabs.indexOf(document.activeElement);
    if (i>=0) tabs[i+1]?.focus();
    else if ([...document.querySelectorAll('.ch-row,.genre-btn')].includes(document.activeElement))
      (cards[0]||tabs[0])?.focus();
  }
  if (e.key==='ArrowLeft') {
    e.preventDefault();
    const tabs=[...document.querySelectorAll('.genre-tab')];
    const i=tabs.indexOf(document.activeElement);
    if (i>0) tabs[i-1]?.focus();
    else document.querySelector('.ch-row,.genre-btn')?.focus();
  }
});

function handlePlayerKey(e) {
  const vid=document.getElementById('video-el');
  showCtrl();
  switch(e.key) {
    case 'Escape': case 'Backspace': closePlayer(); break;
    case ' ': case 'MediaPlayPause': togglePlay(); break;
    case 'ArrowRight': vid.currentTime=Math.min(vid.duration||Infinity,vid.currentTime+10); break;
    case 'ArrowLeft':  vid.currentTime=Math.max(0,vid.currentTime-10); break;
    case 'ArrowUp':    vid.volume=Math.min(1,vid.volume+0.1); document.getElementById('vol-slider').value=vid.volume; break;
    case 'ArrowDown':  vid.volume=Math.max(0,vid.volume-0.1); document.getElementById('vol-slider').value=vid.volume; break;
  }
  e.preventDefault();
}

// ═══════════════════════════════════
//  HELPERS
// ═══════════════════════════════════
function ini(n) { return n.trim().split(/\s+/).slice(0,2).map(w=>w[0]||'').join('').toUpperCase()||'?'; }
function fmt(s) {
  if (!s||isNaN(s)) return '0:00'; s=Math.floor(s);
  const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),ss=s%60;
  return h?`${h}:${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`:`${m}:${String(ss).padStart(2,'0')}`;
}
function setStatus(on,txt) {
  document.getElementById('status-dot').style.color=on?'var(--green)':'var(--muted)';
  document.getElementById('status-txt').textContent=txt;
}
let toastT=null;
function showToast(msg) {
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),3500);
}
function showLoading(txt='Cargando...') {
  document.getElementById('loading-txt').textContent=txt;
  document.getElementById('loading').classList.add('show');
}
function hideLoading() { document.getElementById('loading').classList.remove('show'); }

document.getElementById('url-input').addEventListener('keydown',e=>{ if(e.key==='Enter') loadList(); });
</script>
